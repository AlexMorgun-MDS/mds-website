<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512" role="img" aria-label="MDS network mark">
  <title>MDS — network mark (black, for light backgrounds)</title>
  <!-- an "M" drawn as connected network nodes -->
  <g fill="none" stroke="#0a0a0a">
    <path d="M14 47 V17 L32 35 L50 17 V47" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <g fill="#0a0a0a">
    <circle cx="14" cy="17" r="5"/>
    <circle cx="50" cy="17" r="5"/>
    <circle cx="32" cy="35" r="5"/>
    <circle cx="14" cy="47" r="5"/>
    <circle cx="50" cy="47" r="5"/>
  </g>
</svg>
